<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калина и Карина</title>
<meta name="description" content="Галерия със снимки на Калина и Карина.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #fbf8f3;
    --paper: #fffdfa;
    --ink: #2e2a26;
    --muted: #857c72;
    --gold: #b08d46;
    --line: #e6ddd0;
    --shadow: 0 1px 2px rgba(46,42,38,.04), 0 8px 24px rgba(46,42,38,.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ivory);
    color: var(--ink);
    font-family: 'Jost', system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 24px; }

  /* ---------- Заглавна част ---------- */

  header {
    text-align: center;
    padding: clamp(64px, 12vw, 130px) 24px clamp(40px, 7vw, 72px);
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: .34em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 26px;
  }

  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(46px, 10vw, 88px);
    line-height: 1.05;
    margin: 0;
    letter-spacing: .01em;
  }

  h1 .amp {
    display: block;
    font-style: italic;
    font-size: .42em;
    color: var(--gold);
    margin: .18em 0;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 34px auto 0;
    max-width: 260px;
    color: var(--gold);
  }
  .ornament--top { margin: 0 auto 30px; }
  .ornament::before, .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--line), transparent);
  }

  .subtitle {
    margin: 26px 0 0;
    color: var(--muted);
    font-size: 15px;
    letter-spacing: .05em;
  }

  /* ---------- Табове ---------- */

  nav.albums {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 44px;
  }

  nav.albums button {
    font-family: inherit;
    font-size: 14px;
    letter-spacing: .08em;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all .2s ease;
  }
  nav.albums button:hover { color: var(--ink); border-color: var(--line); }
  nav.albums button[aria-selected="true"] {
    color: var(--ink);
    background: var(--paper);
    border-color: var(--line);
    box-shadow: var(--shadow);
  }
  nav.albums:empty { display: none; }

  /* ---------- Галерия ---------- */

  /* Masonry през истински колони (JS ги пълни) — горният ред е изравнен
     гарантирано във всеки браузър, а надолу снимките се вдигат без празнини. */
  .grid {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding-bottom: 80px;
  }
  .col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  figure {
    margin: 0;
    position: relative;
    background: var(--paper);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: zoom-in;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .7s ease, transform .7s ease, box-shadow .3s ease;
  }
  figure.in { opacity: 1; transform: none; }
  figure:hover { box-shadow: 0 2px 4px rgba(46,42,38,.06), 0 16px 40px rgba(46,42,38,.12); }

  figure img {
    display: block;
    width: 100%;
    height: auto;
    background: #efe9e0;
  }

  /* ---------- Състояния ---------- */

  .state {
    text-align: center;
    padding: 90px 24px 140px;
    color: var(--muted);
  }
  .state p { margin: 0 0 8px; }
  .state .hint { font-size: 13px; opacity: .8; }

  .spinner {
    width: 26px; height: 26px;
    margin: 0 auto 22px;
    border: 1px solid var(--line);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Lightbox ---------- */

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(28,25,22,.94);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity .25s ease;
  }
  .lightbox.open { display: flex; opacity: 1; }

  .lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 2px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    touch-action: pan-y;
    will-change: transform;
  }

  .lightbox button {
    position: absolute;
    background: transparent;
    border: 0;
    color: rgba(255,255,255,.62);
    font-size: 30px;
    line-height: 1;
    padding: 18px;
    cursor: pointer;
    transition: color .2s ease;
    font-family: inherit;
    font-weight: 300;
  }
  .lightbox button:hover { color: #fff; }
  .lb-close { top: 8px; right: 12px; font-size: 34px; }
  .lb-prev { left: 4px; top: 50%; transform: translateY(-50%); }
  .lb-next { right: 4px; top: 50%; transform: translateY(-50%); }

  .lb-count {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.5);
    font-size: 13px;
    letter-spacing: .14em;
  }

  /* Инструменти в lightbox (сподели / принт) */
  .lb-tools {
    position: absolute;
    top: 10px;
    left: 12px;
    display: flex;
    gap: 4px;
  }
  .lb-tools button {
    position: static;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    letter-spacing: .06em;
    color: rgba(255,255,255,.7);
    padding: 9px 14px;
    border-radius: 999px;
  }
  .lb-tools button:hover { color: #fff; background: rgba(255,255,255,.12); }
  .lb-tools svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .lb-tools .label { opacity: .9; }
  @media (max-width: 640px) {
    .lb-tools .label { display: none; }
    .lb-tools button { padding: 10px; }
  }

  .toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(28,25,22,.92);
    color: #fff;
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: .04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .grid { gap: 10px; }
    .col { gap: 10px; }
    .lb-prev, .lb-next { font-size: 24px; padding: 12px; }
  }

  /* Принт: печата се само отворената снимка, чиста и на цяла страница */
  @media print {
    body.lb-open > *:not(.lightbox) { display: none !important; }
    body.lb-open .lightbox {
      position: static; display: block !important;
      background: #fff; opacity: 1 !important;
    }
    body.lb-open .lightbox .lb-close,
    body.lb-open .lightbox .lb-prev,
    body.lb-open .lightbox .lb-next,
    body.lb-open .lb-count,
    body.lb-open .lb-tools { display: none !important; }
    body.lb-open .lightbox img {
      max-width: 100%; max-height: 100vh; box-shadow: none;
    }
  }

  footer {
    text-align: center;
    padding: 50px 24px 70px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    letter-spacing: .09em;
  }
  footer .heart { color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="ornament ornament--top">✦</div>
  <h1>
    Калина
    <span class="amp">и</span>
    Карина
  </h1>
  <p class="subtitle">Двете сестри</p>
</header>

<main class="wrap">
  <nav class="albums" id="albums" role="tablist"></nav>
  <div class="grid" id="grid" hidden></div>

  <div class="state" id="state">
    <div class="spinner"></div>
    <p>Зареждаме спомените…</p>
  </div>
</main>

<footer>
  <span class="heart">✦</span> &nbsp;Калина и Карина
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Преглед на снимка">
  <div class="lb-tools">
    <button id="lbShare" aria-label="Сподели">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.5l6.8-4M8.6 13.5l6.8 4"/></svg>
      <span class="label">Сподели</span>
    </button>
    <button id="lbPrint" aria-label="Принт">
      <svg viewBox="0 0 24 24"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M8 17h8v4H8z"/></svg>
      <span class="label">Принт</span>
    </button>
  </div>
  <button class="lb-close" id="lbClose" aria-label="Затвори">×</button>
  <button class="lb-prev" id="lbPrev" aria-label="Предишна">‹</button>
  <img id="lbImg" alt="">
  <button class="lb-next" id="lbNext" aria-label="Следваща">›</button>
  <div class="lb-count" id="lbCount"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var gridEl   = document.getElementById('grid');
  var stateEl  = document.getElementById('state');
  var tabsEl   = document.getElementById('albums');
  var lb       = document.getElementById('lightbox');
  var lbImg    = document.getElementById('lbImg');
  var lbCount  = document.getElementById('lbCount');

  var albums = [];
  var current = [];   // снимките на активния албум
  var index = 0;

  // Снимките се сервират директно от Google (lh3) в желаната ширина.
  function src(id, w) {
    return 'https://lh3.googleusercontent.com/d/' + id + '=w' + w;
  }

  // Разбъркване (Fisher–Yates) — редът е различен при всяко зареждане.
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // Появяване при скрол
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { rootMargin: '120px' });

  function columnCount() {
    return window.innerWidth <= 640 ? 2 : 3;
  }

  function render(photos) {
    current = photos;
    gridEl.innerHTML = '';

    var n = columnCount();
    var cols = [];
    for (var c = 0; c < n; c++) {
      var col = document.createElement('div');
      col.className = 'col';
      gridEl.appendChild(col);
      cols.push(col);
    }

    photos.forEach(function (photo, i) {
      var fig = document.createElement('figure');
      var img = document.createElement('img');
      img.src = src(photo.id, 1000);
      img.loading = 'lazy';
      img.decoding = 'async';
      img.alt = 'Калина и Карина — снимка ' + (i + 1);
      fig.appendChild(img);
      fig.addEventListener('click', function () { open(i); });
      cols[i % n].appendChild(fig);   // редуваме колоните → горе винаги изравнено
      io.observe(fig);
    });

    gridEl.hidden = false;
  }

  // Пре-подреждаме само ако броят колони се смени (напр. завъртане на телефона).
  var lastCols = columnCount();
  window.addEventListener('resize', function () {
    var n = columnCount();
    if (n !== lastCols && current.length) { lastCols = n; render(current); }
  });

  function buildTabs() {
    if (albums.length < 2) return;

    albums.forEach(function (album, i) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.textContent = album.title;
      btn.addEventListener('click', function () {
        Array.prototype.forEach.call(tabsEl.children, function (b) {
          b.setAttribute('aria-selected', 'false');
        });
        btn.setAttribute('aria-selected', 'true');
        render(album.photos);
        window.scrollTo({ top: tabsEl.offsetTop - 90, behavior: 'smooth' });
      });
      tabsEl.appendChild(btn);
    });
  }

  /* ---------- Lightbox ---------- */

  function preload(i) {
    if (i < 0 || i >= current.length) return;
    var im = new Image();
    im.src = src(current[i].id, 2000);
  }

  function open(i) {
    index = i;
    lbImg.style.transition = 'none';
    lbImg.style.transform = 'translateX(0)';
    lbImg.style.opacity = '1';
    lbImg.src = src(current[index].id, 2000);
    lbCount.textContent = (index + 1) + ' / ' + current.length;
    lb.classList.add('open');
    document.body.classList.add('lb-open');
    document.body.style.overflow = 'hidden';
    preload(index + 1);
    preload(index - 1);
  }

  function close() {
    lb.classList.remove('open');
    document.body.classList.remove('lb-open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  /* ---------- Сподели / Принт ---------- */

  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2200);
  }

  var SITE_URL = 'https://kalinakarina.site';

  function shareCurrent() {
    var photo = current[index];
    var imgUrl = src(photo.id, 2000);

    // Най-добре на телефон: споделяме самата снимка като файл.
    if (navigator.canShare) {
      fetch(imgUrl)
        .then(function (r) { return r.blob(); })
        .then(function (blob) {
          var file = new File([blob], photo.name || 'snimka.jpg', { type: blob.type || 'image/jpeg' });
          if (navigator.canShare({ files: [file] })) {
            return navigator.share({ files: [file], title: 'Калина и Карина' });
          }
          throw new Error('no-file-share');
        })
        .catch(function () { shareLink(); });
      return;
    }
    shareLink();
  }

  function shareLink() {
    if (navigator.share) {
      navigator.share({ title: 'Калина и Карина', text: 'Снимки на Калина и Карина', url: SITE_URL }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(SITE_URL).then(function () { toast('Линкът е копиран'); }, function () {});
    } else {
      toast(SITE_URL);
    }
  }

  document.getElementById('lbShare').addEventListener('click', function (e) { e.stopPropagation(); shareCurrent(); });
  document.getElementById('lbPrint').addEventListener('click', function (e) { e.stopPropagation(); window.print(); });

  function step(delta) {
    index = (index + delta + current.length) % current.length;
    open(index);
  }

  document.getElementById('lbClose').addEventListener('click', close);
  document.getElementById('lbPrev').addEventListener('click', function (e) { e.stopPropagation(); step(-1); });
  document.getElementById('lbNext').addEventListener('click', function (e) { e.stopPropagation(); step(1); });
  lb.addEventListener('click', function (e) { if (e.target === lb) close(); });

  document.addEventListener('keydown', function (e) {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') step(-1);
    if (e.key === 'ArrowRight') step(1);
  });

  // Плавно плъзгане с пръст на телефон — снимката следва пръста.
  var startX = null, startY = null, dragging = false, dragDX = 0, animating = false;
  function W() { return window.innerWidth; }

  lb.addEventListener('touchstart', function (e) {
    if (animating || e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = false; dragDX = 0;
    lbImg.style.transition = 'none';
  }, { passive: true });

  lb.addEventListener('touchmove', function (e) {
    if (startX === null) return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if (!dragging) {
      if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy) * 1.3) dragging = true;
      else if (Math.abs(dy) > 10) { startX = null; return; } // вертикално — не пипаме
      else return;
    }
    dragDX = dx;
    e.preventDefault();
    lbImg.style.transform = 'translateX(' + dx + 'px)';
    lbImg.style.opacity = String(Math.max(0.35, 1 - Math.abs(dx) / W()));
  }, { passive: false });

  lb.addEventListener('touchend', function () {
    if (startX === null) return;
    var threshold = Math.min(90, W() * 0.18);
    if (dragging && Math.abs(dragDX) > threshold) {
      commitSwipe(dragDX < 0 ? 1 : -1);
    } else {
      lbImg.style.transition = 'transform .2s ease, opacity .2s ease';
      lbImg.style.transform = 'translateX(0)';
      lbImg.style.opacity = '1';
    }
    startX = null; dragging = false;
  }, { passive: true });

  // Изкарва текущата снимка настрани, зарежда следващата и я вкарва от другата страна.
  function commitSwipe(dir) {
    animating = true;
    lbImg.style.transition = 'transform .18s ease, opacity .18s ease';
    lbImg.style.transform = 'translateX(' + (dir * -W()) + 'px)';
    lbImg.style.opacity = '0';
    setTimeout(function () {
      index = (index + dir + current.length) % current.length;
      lbImg.style.transition = 'none';
      lbImg.style.transform = 'translateX(' + (dir * W()) + 'px)';
      lbImg.src = src(current[index].id, 2000);
      lbCount.textContent = (index + 1) + ' / ' + current.length;
      preload(index + dir);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          lbImg.style.transition = 'transform .22s ease, opacity .22s ease';
          lbImg.style.transform = 'translateX(0)';
          lbImg.style.opacity = '1';
          setTimeout(function () { animating = false; }, 230);
        });
      });
    }, 180);
  }

  /* ---------- Зареждане ---------- */

  function fail(msg, hint) {
    stateEl.innerHTML = '<p>' + msg + '</p>' + (hint ? '<p class="hint">' + hint + '</p>' : '');
  }

  fetch('photos.json?t=' + Date.now())
    .then(function (r) {
      if (!r.ok) throw new Error('Списъкът със снимки не се зареди.');
      return r.json();
    })
    .then(function (data) {
      var photos = (data.photos || []).slice();

      if (!photos.length) {
        return fail('Още няма снимки.', 'Качи ги в Drive папката.');
      }

      albums = [{ title: 'Галерия', photos: shuffle(photos) }];

      stateEl.remove();
      buildTabs();
      render(albums[0].photos);
    })
    .catch(function (err) {
      fail('Снимките не се заредиха.', String(err.message || err));
    });
})();
</script>

</body>
</html>
